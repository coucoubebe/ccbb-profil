<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>coucoubebe75018</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#7fd9ff;
    --accent-strong:#bdeeff;
    --accent-dim:rgba(127,217,255,0.28);
    --text:#eaf6ff;
    --text-dim:rgba(234,246,255,0.55);
    --glass:rgba(8,18,32,0.42);
    --glass-strong:rgba(8,18,32,0.72);
    --live:#ff4e64;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'M PLUS Rounded 1c', 'Noto Sans', sans-serif;
    color:var(--text);
    overflow:hidden;
    background:#020508;
  }

  #bg-video{
    position:fixed;
    inset:-20px;
    width:calc(100% + 40px);
    height:calc(100% + 40px);
    object-fit:cover;
    z-index:0;
    filter: blur(12px) brightness(0.65) saturate(1.4);
    transform: scale(1.1);
  }
  .overlay{
    position:fixed; inset:0;
    background:rgba(2,6,12,0.2);
    z-index:1;
    pointer-events:none;
  }
  .bloom{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:
      radial-gradient(circle at 30% 40%, rgba(127,217,255,0.25), transparent 35%),
      radial-gradient(circle at 70% 60%, rgba(120,80,255,0.2), transparent 40%);
    filter:blur(50px);
  }
  .bg-bloom{
    position:fixed;
    inset:-50px;
    z-index:0;
    background:inherit;
    filter:blur(70px);
    opacity:0.35;
    pointer-events:none;
  }
  .sweep{
    position:fixed; inset:0;
    z-index:1;
    pointer-events:none;
    background:linear-gradient(100deg, transparent 0%, rgba(127,217,255,0.06) 45%, rgba(127,217,255,0.10) 50%, rgba(127,217,255,0.06) 55%, transparent 100%);
    background-size:250% 100%;
    animation: sweep 14s linear infinite;
  }
  @keyframes sweep{
    0%{background-position:120% 0;}
    100%{background-position:-20% 0;}
  }

  main.xmb{
    position:relative; z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding: 0 4vw;
  }

  .xmb-categories{
    display:flex;
    align-items:center;
    gap:56px;
    transition: transform 0.5s cubic-bezier(.22,.61,.36,1);
    will-change: transform;
  }
  .cat{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    flex-shrink:0;
    opacity:0.38;
    filter: blur(0.4px) brightness(0.75);
    transform: scale(0.82);
    transition: opacity 0.45s ease, filter 0.45s ease, transform 0.45s cubic-bezier(.22,.61,.36,1);
    cursor:pointer;
  }
  .cat .icon-wrap{
    position:relative;
    width:74px; height:74px;
    border-radius:18px;
    display:flex; align-items:center; justify-content:center;
    background:var(--glass);
    border:1px solid rgba(255,255,255,0.06);
    transition: box-shadow 0.45s ease, background 0.45s ease, border-color .45s ease;
  }
  .cat svg{ width:36px; height:36px; fill:var(--text); opacity:0.85; }
  .cat .label{
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-dim);
    font-weight:500;
    opacity:0;
    transform:translateY(-4px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .cat.active{
    opacity:1;
    filter:none;
    transform: scale(1.18);
  }
  .cat.active .icon-wrap{
    background: var(--glass-strong);
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 1px var(--accent-dim), 0 0 34px var(--accent-dim), 0 8px 24px rgba(0,0,0,0.4);
  }
  .cat.active svg{ fill:var(--accent-strong); opacity:1; }
  .cat.active .label{ opacity:1; transform:translateY(0); color:var(--accent-strong); }

  .status-dot{
    position:absolute;
    width:14px; height:14px;
    border-radius:50%;
    border:2px solid rgba(2,6,12,0.9);
    background:#6b7280;
    top:50px; left:50px;
  }
  .status-dot.online{ background:#3ba55d; }
  .status-dot.idle{ background:#faa61a; }
  .status-dot.dnd{ background:#ed4245; }
  .status-dot.live{ background:var(--live); box-shadow:0 0 10px var(--live); animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse{
    0%,100%{ box-shadow:0 0 6px var(--live); }
    50%{ box-shadow:0 0 14px var(--live); }
  }

  .xmb-submenu{
    margin-top:80px;
    min-height:220px;
  }
  .submenu-inner{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-width:460px;
    animation: rise 0.4s cubic-bezier(.22,.61,.36,1);
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .submenu-item{
    display:flex;
    align-items:center;
    gap:16px;
    padding:14px 18px;
    border-radius:12px;
    background:var(--glass);
    border:1px solid rgba(255,255,255,0.05);
    text-decoration:none;
    color:var(--text);
    transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
  }
  .submenu-item.selected{
    background:var(--glass-strong);
    border-color:var(--accent-dim);
    transform: translateX(10px);
    box-shadow: 0 0 24px rgba(127,217,255,0.12);
  }
  .submenu-item .pfp{
    width:46px; height:46px;
    border-radius:50%;
    object-fit:cover;
    background:rgba(255,255,255,0.08);
    flex-shrink:0;
  }
  .submenu-item .meta{ display:flex; flex-direction:column; gap:3px; }
  .submenu-item .title{ font-size:15px; font-weight:700; }
  .submenu-item .subtitle{ font-size:12.5px; color:var(--text-dim); }
  .badge{
    margin-left:auto;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.06em;
    padding:4px 10px;
    border-radius:999px;
    background:rgba(255,255,255,0.08);
    color:var(--text-dim);
    text-transform:uppercase;
    flex-shrink:0;
  }
  .badge.live{ background:var(--live); color:white; }
  .badge.online{ background:rgba(59,165,93,0.18); color:#7be79a; }

  .hint{
    position:fixed;
    bottom:24px; left:0; right:0;
    z-index:2;
    text-align:center;
    font-size:12px;
    letter-spacing:0.08em;
    color:var(--text-dim);
    text-transform:uppercase;
  }

  @media (max-width:640px){
    .xmb-categories{ gap:30px; }
    .cat .icon-wrap{ width:58px; height:58px; }
    .cat svg{ width:28px; height:28px; }
    .cat .label{ font-size:11px; }
    .submenu-inner{ max-width:100%; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline>
  <source src="video.webm" type="video/webm">
</video>
<div class="bg-bloom"></div>
<div class="overlay"></div>
<div class="sweep"></div>
</video>
<div class="overlay"></div>
<div class="sweep"></div>

<main class="xmb">
  <nav class="xmb-categories" id="categories"></nav>
  <section class="xmb-submenu" id="submenu"></section>
</main>

<div class="hint">← → naviguer &nbsp;·&nbsp; ↑ ↓ sélectionner &nbsp;·&nbsp; Entrée ouvrir</div>

<script>
/* =======================================================================
   CONFIG — à modifier / compléter ici
   ======================================================================= */
const CONFIG = {
  discord: {
    id: "1313603583068864554" // ton ID Discord (Lanyard)
  },
  twitch: {
    channel: "coucoubebe75018" // ton nom de chaîne Twitch
  },
  // TODO : ajoute tes liens TikTok et YouTube ici
  tiktok: {
    label: "@ton_pseudo",
    url: "#"
  },
  youtube: {
    label: "Ta chaîne YouTube",
    url: "#"
  }
};

/* =======================================================================
   Icônes (SVG génériques, dessinées à la main — pas de logos protégés)
   ======================================================================= */
const ICONS = {
  discord: '<svg viewBox="0 0 24 24"><path d="M9 12a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm9 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0ZM7.5 4.5C5 5 3.2 7 2.5 9.5c-.8 2.9-.9 6-.3 8.9.1.2.2.4.4.5 1.6 1.2 3.2 1.9 4.8 2.3.4-.5.7-1.1 1-1.7-.6-.2-1.1-.5-1.6-.8-.1-.1-.1-.3 0-.4l.4-.3c.1 0 .2 0 .3.1 2.9 1.4 6.1 1.4 9 0 .1 0 .2 0 .3-.1l.4.3c.1.1.1.3 0 .4-.5.3-1 .6-1.6.8.3.6.6 1.2 1 1.7 1.6-.4 3.2-1.1 4.8-2.3.2-.1.3-.3.4-.5.7-3.4.3-6.7-1.5-9.7C20.8 7 19 5 16.5 4.5c-.3.5-.6 1.1-.8 1.6-1.8-.3-3.7-.3-5.4 0-.2-.5-.5-1.1-.8-1.6Z"/></svg>',
  twitch: '<svg viewBox="0 0 24 24"><path d="M4 2 2.5 6v13h5V21l3-2h3.5L20 13.5V2H4Zm14 10.5-3 3h-3.5l-2.5 2v-2H5.5V4H18v8.5ZM15 6.5h2V11h-2V6.5Zm-4.5 0h2V11h-2V6.5Z"/></svg>',
  tiktok: '<svg viewBox="0 0 24 24"><path d="M14 2h3c.2 1.9 1.3 3.5 3 4.3v3c-1.5 0-2.9-.4-4-1.2v7c0 3.3-2.7 6-6 6s-6-2.7-6-6 2.7-6 6-6c.3 0 .7 0 1 .1v3.1c-.3-.1-.7-.2-1-.2-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3V2Z"/></svg>',
  youtube: '<svg viewBox="0 0 24 24"><path d="M22 12s0-3.4-.4-5a2.5 2.5 0 0 0-1.8-1.8C18.1 4.8 12 4.8 12 4.8s-6.1 0-7.8.4A2.5 2.5 0 0 0 2.4 7C2 8.6 2 12 2 12s0 3.4.4 5a2.5 2.5 0 0 0 1.8 1.8c1.7.4 7.8.4 7.8.4s6.1 0 7.8-.4a2.5 2.5 0 0 0 1.8-1.8c.4-1.6.4-5 .4-5ZM10 15.5v-7l6 3.5-6 3.5Z"/></svg>'
};

/* =======================================================================
   Etat
   ======================================================================= */
let categories = [
  { id:"discord", label:"Discord", type:"discord", statusClass:"", items:[
    { title:"Chargement…", subtitle:"", badge:"", url:"#", pfp:null }
  ]},
  { id:"twitch", label:"Twitch", type:"twitch", statusClass:"", items:[
    { title:CONFIG.twitch.channel, subtitle:"Vérification du live…", badge:"", url:`https://twitch.tv/${CONFIG.twitch.channel}`, pfp:null }
  ]},
  { id:"tiktok", label:"TikTok", type:"static", items:[
    { title:CONFIG.tiktok.label, subtitle:"Voir le profil", badge:"", url:CONFIG.tiktok.url, pfp:null }
  ]},
  { id:"youtube", label:"YouTube", type:"static", items:[
    { title:CONFIG.youtube.label, subtitle:"Voir la chaîne", badge:"", url:CONFIG.youtube.url, pfp:null }
  ]}
];

let activeCatIndex = 0;
let activeItemIndex = 0;

const categoriesEl = document.getElementById("categories");
const submenuEl = document.getElementById("submenu");

/* =======================================================================
   Son de navigation (bip synthé, pas de fichier audio nécessaire)
   ======================================================================= */
let audioCtx;
function blip(freq){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = "sine";
    o.frequency.value = freq;
    g.gain.value = 0.05;
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + 0.18);
  }catch(e){ /* autoplay policy: ignore tant que l'utilisateur n'a pas interagi */ }
}

/* =======================================================================
   Rendu
   ======================================================================= */
function renderCategories(){
  categoriesEl.innerHTML = "";
  categories.forEach((cat, i) => {
    const el = document.createElement("div");
    el.className = "cat" + (i === activeCatIndex ? " active" : "");
    el.innerHTML = `
      <div class="icon-wrap">
        ${ICONS[cat.id]}
        ${cat.statusClass ? `<div class="status-dot ${cat.statusClass}"></div>` : ""}
      </div>
      <div class="label">${cat.label}</div>
    `;
    el.addEventListener("click", () => { selectCategory(i); });
    categoriesEl.appendChild(el);
  });
  centerActiveCategory();
}

function centerActiveCategory(){
  const catWidth = 74 + 56; // icône + gap approx
  const paddingLeft = window.innerWidth * 0.04;
  const offset = window.innerWidth / 2 - (activeCatIndex * catWidth) - 37 - paddingLeft;
  categoriesEl.style.transform = `translateX(${offset}px)`;
}

function renderSubmenu(){
  const cat = categories[activeCatIndex];
  const wrap = document.createElement("div");
  wrap.className = "submenu-inner";
  cat.items.forEach((item, i) => {
    const a = document.createElement("a");
    a.href = item.url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.className = "submenu-item" + (i === activeItemIndex ? " selected" : "");
    a.innerHTML = `
      ${item.pfp ? `<img class="pfp" src="${item.pfp}" alt="">` : `<div class="pfp"></div>`}
      <div class="meta">
        <div class="title">${item.title}</div>
        <div class="subtitle">${item.subtitle}</div>
      </div>
      ${item.badge ? `<div class="badge ${item.badgeClass || ""}">${item.badge}</div>` : ""}
    `;
    wrap.appendChild(a);
  });
  submenuEl.innerHTML = "";
  submenuEl.appendChild(wrap);
}

function selectCategory(i){
  if(i < 0 || i >= categories.length) return;
  activeCatIndex = i;
  activeItemIndex = 0;
  blip(520 + i * 40);
  renderCategories();
  renderSubmenu();
}

function selectItem(delta){
  const cat = categories[activeCatIndex];
  const next = activeItemIndex + delta;
  if(next < 0 || next >= cat.items.length) return;
  activeItemIndex = next;
  blip(440);
  renderSubmenu();
}

/* =======================================================================
   Navigation clavier
   ======================================================================= */
window.addEventListener("keydown", (e) => {
  switch(e.key){
    case "ArrowRight": selectCategory(activeCatIndex + 1); break;
    case "ArrowLeft": selectCategory(activeCatIndex - 1); break;
    case "ArrowDown": selectItem(1); break;
    case "ArrowUp": selectItem(-1); break;
    case "Enter": {
      const item = categories[activeCatIndex].items[activeItemIndex];
      if(item && item.url && item.url !== "#") window.open(item.url, "_blank");
      break;
    }
  }
});
window.addEventListener("resize", centerActiveCategory);

/* =======================================================================
   Discord — via Lanyard (api.lanyard.rest)
   NOTE : pour que ton statut soit suivi, tu dois avoir rejoint une fois
   le serveur Discord officiel de Lanyard : https://discord.gg/lanyard
   ======================================================================= */
async function fetchDiscord(){
  try{
    const res = await fetch(`https://api.lanyard.rest/v1/users/${CONFIG.discord.id}`);
    const json = await res.json();
    if(!json.success) throw new Error("Lanyard: profil non trouvé (as-tu rejoint le serveur Lanyard ?)");
    const d = json.data;
    const user = d.discord_user;
    const pfp = user.avatar
      ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`
      : null;
    const statusMap = { online:"En ligne", idle:"Absent", dnd:"Ne pas déranger", offline:"Hors ligne" };
    const statusClassMap = { online:"online", idle:"idle", dnd:"dnd", offline:"" };
    let subtitle = statusMap[d.discord_status] || "Statut inconnu";
    if(d.activities && d.activities.length){
      const act = d.activities.find(a => a.type !== 4) || d.activities[0];
      if(act && act.name) subtitle = `${statusMap[d.discord_status]} · ${act.name}`;
    }
    categories[0].statusClass = statusClassMap[d.discord_status] || "";
    categories[0].items = [{
      title: `${user.username}`,
      subtitle,
      badge: statusMap[d.discord_status],
      badgeClass: d.discord_status === "online" ? "online" : "",
      url: `https://discord.com/users/${user.id}`,
      pfp
    }];
  }catch(err){
    categories[0].items = [{
      title:"Discord indisponible",
      subtitle: err.message,
      badge:"", url:"#", pfp:null
    }];
  }
  renderCategories();
  if(activeCatIndex === 0) renderSubmenu();
}

/* =======================================================================
   Twitch — via decapi.me (aucune clé API nécessaire)
   ======================================================================= */
async function fetchTwitch(){
  try{
    const uptimeRes = await fetch(`https://decapi.me/twitch/uptime/${CONFIG.twitch.channel}`);
    const uptime = (await uptimeRes.text()).trim();
    const isLive = !/offline/i.test(uptime);
    let subtitle = isLive ? `En live depuis ${uptime}` : "Hors ligne";
    let badge = isLive ? "LIVE" : "Hors ligne";

    if(isLive){
      try{
        const titleRes = await fetch(`https://decapi.me/twitch/title/${CONFIG.twitch.channel}`);
        const title = (await titleRes.text()).trim();
        if(title) subtitle = title;
      }catch(e){}
    }

    categories[1].statusClass = isLive ? "live" : "";
    categories[1].items = [{
      title: CONFIG.twitch.channel,
      subtitle,
      badge,
      badgeClass: isLive ? "live" : "",
      url: `https://twitch.tv/${CONFIG.twitch.channel}`,
      pfp:null
    }];
  }catch(err){
    categories[1].items = [{
      title: CONFIG.twitch.channel,
      subtitle:"Statut indisponible",
      badge:"", url:`https://twitch.tv/${CONFIG.twitch.channel}`, pfp:null
    }];
  }
  renderCategories();
  if(activeCatIndex === 1) renderSubmenu();
}

/* =======================================================================
   Init
   ======================================================================= */
renderCategories();
renderSubmenu();
fetchDiscord();
fetchTwitch();
setInterval(fetchDiscord, 30000);
setInterval(fetchTwitch, 60000);
</script>
</body>
