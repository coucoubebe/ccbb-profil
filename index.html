<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>coucoubebe75018</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#7fd9ff;
    --accent-strong:#bdeeff;
    --accent-dim:rgba(127,217,255,0.28);
    --text:#eaf6ff;
    --text-dim:rgba(234,246,255,0.55);
    --glass:rgba(8,18,32,0.42);
    --glass-strong:rgba(8,18,32,0.72);
    --live:#ff4e64;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'M PLUS Rounded 1c', 'Noto Sans', sans-serif;
    color:var(--text);
    overflow:hidden;
    background:#020508;
  }

  /* ============================ BOOT SCREEN ============================ */
  #boot-screen{
    position:fixed; inset:0;
    z-index:100;
    background:#000;
    display:flex; align-items:center; justify-content:center;
    transition:opacity 0.9s ease, visibility 0.9s ease;
  }
  #boot-screen.hidden{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }
  .boot-logo-img{
    max-width:min(92vw, 520px);
    max-height:min(60vh, 440px);
    width:auto;
    height:auto;
    opacity:0;
    filter:drop-shadow(0 0 30px var(--accent-dim)) drop-shadow(0 0 70px rgba(127,217,255,0.35));
    animation: boot-in 2.1s cubic-bezier(.22,.61,.36,1) forwards;
  }
  .boot-bar{
    position:absolute;
    bottom:18%;
    width:180px;
    height:2px;
    background:rgba(255,255,255,0.08);
    overflow:hidden;
    border-radius:2px;
  }
  .boot-bar::after{
    content:"";
    position:absolute;
    inset:0;
    width:40%;
    background:linear-gradient(90deg, transparent, var(--accent-strong), transparent);
    animation: boot-scan 1.6s ease-in-out infinite;
  }
  @keyframes boot-scan{
    0%{ transform:translateX(-120%); }
    100%{ transform:translateX(280%); }
  }
  @keyframes boot-in{
    0%{ opacity:0; transform:scale(0.85); }
    45%{ opacity:1; transform:scale(1.03); }
    100%{ opacity:1; transform:scale(1); }
  }

  #bg-video{
    position:fixed;
    inset:-20px;
    width:calc(100% + 40px);
    height:calc(100% + 40px);
    object-fit:cover;
    z-index:0;
    filter: blur(12px) brightness(0.65) saturate(1.4);
    transform: scale(1.1);
  }
  .overlay{
    position:fixed; inset:0;
    background:rgba(2,6,12,0.2);
    z-index:1;
    pointer-events:none;
  }
  .bloom{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:
      radial-gradient(circle at 30% 40%, rgba(127,217,255,0.25), transparent 35%),
      radial-gradient(circle at 70% 60%, rgba(120,80,255,0.2), transparent 40%);
    filter:blur(50px);
  }
  .bg-bloom{
    position:fixed;
    inset:-50px;
    z-index:0;
    background:inherit;
    filter:blur(70px);
    opacity:0.35;
    pointer-events:none;
  }
  .sweep{
    position:fixed; inset:0;
    z-index:1;
    pointer-events:none;
    background:linear-gradient(100deg, transparent 0%, rgba(127,217,255,0.06) 45%, rgba(127,217,255,0.10) 50%, rgba(127,217,255,0.06) 55%, transparent 100%);
    background-size:250% 100%;
    animation: sweep 14s linear infinite;
  }
  @keyframes sweep{
    0%{background-position:120% 0;}
    100%{background-position:-20% 0;}
  }

  /* ============================ CORNER LOGO ============================ */
  #corner-logo-wrap{
    position:fixed;
    top:20px; left:22px;
    z-index:15;
    width:440px; height:440px;
    pointer-events:none;
  }
  #corner-logo-wrap img{
    width:100%; height:100%;
    object-fit:contain;
    display:block;
    opacity:0.92;
    filter:drop-shadow(0 4px 14px rgba(0,0,0,0.5));
  }

  main.xmb{
    position:relative; z-index:2;
    height:100%;
  }

  /* La ligne de catégories est centrée verticalement de façon FIXE,
     indépendamment de la hauteur du sous-menu en dessous (qui peut varier,
     ex: bloc embed Twitch) — ainsi elle ne bouge jamais quand le contenu
     du sous-menu change de taille. */
  .xmb-categories-viewport{
    position:absolute;
    top:50%;
    left:0; right:0;
    transform:translateY(-50%);
    padding:0 4vw;
    overflow:hidden;
  }

  .xmb-categories{
    display:flex;
    align-items:center;
    gap:56px;
    transition: transform 0.5s cubic-bezier(.22,.61,.36,1);
    will-change: transform;
  }
  .cat{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    flex-shrink:0;
    opacity:0.38;
    filter: blur(0.4px) brightness(0.75);
    transform: scale(0.82);
    transition: opacity 0.45s ease, filter 0.45s ease, transform 0.45s cubic-bezier(.22,.61,.36,1);
    cursor:pointer;
  }
  .cat .icon-wrap{
    position:relative;
    width:74px; height:74px;
    border-radius:18px;
    display:flex; align-items:center; justify-content:center;
    background:var(--glass);
    border:1px solid rgba(255,255,255,0.06);
    transition: box-shadow 0.45s ease, background 0.45s ease, border-color .45s ease;
    overflow:hidden;
  }
  .cat svg{ width:36px; height:36px; fill:var(--text); opacity:0.85; }
  .cat img.logo-img{ width:38px; height:38px; object-fit:contain; }
  .cat .label{
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-dim);
    font-weight:500;
    opacity:0;
    transform:translateY(-4px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .cat.active{
    opacity:1;
    filter:none;
    transform: scale(1.18);
  }
  .cat.active .icon-wrap{
    background: var(--glass-strong);
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 1px var(--accent-dim), 0 0 34px var(--accent-dim), 0 8px 24px rgba(0,0,0,0.4);
  }
  .cat.active svg{ fill:var(--accent-strong); opacity:1; }
  .cat.active .label{ opacity:1; transform:translateY(0); color:var(--accent-strong); }

  .status-dot{
    position:absolute;
    width:14px; height:14px;
    border-radius:50%;
    border:2px solid rgba(2,6,12,0.9);
    background:#6b7280;
    top:50px; left:50px;
  }
  .status-dot.online{ background:#3ba55d; }
  .status-dot.idle{ background:#faa61a; }
  .status-dot.dnd{ background:#ed4245; }
  .status-dot.live{ background:var(--live); box-shadow:0 0 10px var(--live); animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse{
    0%,100%{ box-shadow:0 0 6px var(--live); }
    50%{ box-shadow:0 0 14px var(--live); }
  }

  .xmb-submenu{
    position:absolute;
    top:calc(50% + 75px);
    left:4vw; right:4vw;
  }
  .submenu-inner{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-width:460px;
    animation: rise 0.4s cubic-bezier(.22,.61,.36,1);
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .submenu-item{
    display:flex;
    align-items:center;
    gap:16px;
    padding:14px 18px;
    border-radius:12px;
    background:var(--glass);
    border:1px solid rgba(255,255,255,0.05);
    text-decoration:none;
    color:var(--text);
    transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
  }
  .submenu-item.selected{
    background:var(--glass-strong);
    border-color:var(--accent-dim);
    transform: translateX(10px);
    box-shadow: 0 0 24px rgba(127,217,255,0.12);
  }
  .submenu-item .pfp{
    width:46px; height:46px;
    border-radius:50%;
    object-fit:cover;
    background:rgba(255,255,255,0.08);
    flex-shrink:0;
  }
  .submenu-item .meta{ display:flex; flex-direction:column; gap:3px; }
  .submenu-item .title{ font-size:15px; font-weight:700; }
  .submenu-item .subtitle{ font-size:12.5px; color:var(--text-dim); }

  /* Bloc embed (ex: preview Twitch) — même largeur que les autres blocs,
     mais empilé verticalement pour accueillir le lecteur vidéo. */
  .submenu-item.embed-item{
    flex-direction:column;
    align-items:stretch;
    gap:10px;
    cursor:default;
  }
  .embed-item .embed-label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dim);
  }
  .embed-item .embed-label .dot{
    width:8px; height:8px;
    border-radius:50%;
    background:#6b7280;
    flex-shrink:0;
  }
  .embed-item .embed-label .dot.live{
    background:var(--live);
    box-shadow:0 0 8px var(--live);
    animation:pulse 1.4s ease-in-out infinite;
  }
  .twitch-embed-wrap{
    position:relative;
    width:100%;
    padding-top:56.25%; /* ratio 16:9, cf. technique responsive-embed Twitch */
    border-radius:10px;
    overflow:hidden;
    background:rgba(0,0,0,0.35);
  }
  .twitch-embed-wrap iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:0;
  }
  .twitch-embed-wrap .embed-fallback{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:16px;
    font-size:12.5px;
    color:var(--text-dim);
  }
  .badge{
    margin-left:auto;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.06em;
    padding:4px 10px;
    border-radius:999px;
    background:rgba(255,255,255,0.08);
    color:var(--text-dim);
    text-transform:uppercase;
    flex-shrink:0;
  }
  .badge.live{ background:var(--live); color:white; }
  .badge.online{ background:rgba(59,165,93,0.2); color:#7be79a; border:1px solid rgba(59,165,93,0.5); }
  .badge.idle{ background:rgba(250,166,26,0.2); color:#ffce7a; border:1px solid rgba(250,166,26,0.5); }
  .badge.dnd{ background:rgba(237,66,69,0.2); color:#ff9297; border:1px solid rgba(237,66,69,0.5); }
  .badge.offline{ background:rgba(107,114,128,0.2); color:#c9ced6; border:1px solid rgba(107,114,128,0.5); }

  .hint{
    position:fixed;
    bottom:24px; left:0; right:0;
    z-index:2;
    text-align:center;
    font-size:12px;
    letter-spacing:0.08em;
    color:var(--text-dim);
    text-transform:uppercase;
  }

  /* ============================ MUSIC PLAYER ============================ */
  #music-player{
    position:fixed;
    top:50%;
    right:22px;
    transform:translateY(-50%);
    z-index:20;
    width:196px;
    background:var(--glass-strong);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    backdrop-filter:blur(14px);
    box-shadow:0 12px 30px rgba(0,0,0,0.45);
    transition: width 0.4s cubic-bezier(.22,.61,.36,1), height 0.4s cubic-bezier(.22,.61,.36,1), padding 0.4s ease, transform 0.4s ease;
  }
  #music-player .mp-top{
    display:flex; width:100%; justify-content:flex-end;
  }
  #mp-minimize{
    background:transparent;
    border:none;
    color:var(--text-dim);
    font-size:12px;
    cursor:pointer;
    width:22px; height:22px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  #mp-minimize:hover{ background:var(--glass); color:var(--text); }

  #music-player .cover{
    width:120px; height:120px;
    border-radius:14px;
    object-fit:cover;
    background:rgba(255,255,255,0.06);
    box-shadow:0 8px 22px rgba(0,0,0,0.4);
    transition: width 0.4s ease, height 0.4s ease, border-radius 0.4s ease;
  }
  #music-player .track-title{ font-size:13.5px; font-weight:700; text-align:center; line-height:1.3; }
  #music-player .track-artist{ font-size:11.5px; color:var(--text-dim); text-align:center; }

  #music-player .mp-controls{
    display:flex; align-items:center; justify-content:center; gap:12px;
    margin-top:2px;
  }
  #music-player button.mp-btn{
    background:var(--glass);
    border:1px solid rgba(255,255,255,0.08);
    color:var(--text);
    border-radius:50%;
    width:34px; height:34px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition: background .2s ease, transform .2s ease;
  }
  #music-player button.mp-btn:hover{ background:rgba(127,217,255,0.16); transform:scale(1.08); }
  #music-player button.mp-btn svg{ width:15px; height:15px; fill:var(--text); }
  #mp-play svg{ width:14px; height:14px; }

  #music-player .mp-volume-row{
    display:flex; align-items:center; gap:8px; width:100%; margin-top:2px;
  }
  #music-player .mp-volume-row svg{ width:14px; height:14px; fill:var(--text-dim); flex-shrink:0; }
  #mp-volume{
    width:100%;
    accent-color: var(--accent);
  }

  /* état minimisé : ne garde qu'une pastille ronde avec la pochette */
  #music-player.minimized{
    width:64px;
    padding:8px;
    border-radius:50%;
    gap:0;
  }
  #music-player.minimized .mp-top,
  #music-player.minimized .track-title,
  #music-player.minimized .track-artist,
  #music-player.minimized .mp-controls,
  #music-player.minimized .mp-volume-row{
    display:none;
  }
  #music-player.minimized .cover{
    width:48px; height:48px; border-radius:50%; cursor:pointer;
  }

  @media (max-width:900px){
    #music-player{ display:none; } /* espace réduit sur mobile, le lecteur reste disponible via le bouton flottant */
    #music-player.force-show{ display:flex; }
  }

  @media (max-width:640px){
    .xmb-categories{ gap:30px; }
    .cat .icon-wrap{ width:58px; height:58px; }
    .cat svg{ width:28px; height:28px; }
    .cat .label{ font-size:11px; }
    .submenu-inner{ max-width:100%; }
    #corner-logo-wrap{ width:260px; height:260px; top:14px; left:14px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>

};

function iconMarkup(cat){
  const custom = CONFIG.logos[cat.id];
  if(custom){
    return `<img class="logo-img" src="${custom}" alt="${cat.label}">`;
  }
  return ICONS[cat.id] || "";
}

/* =======================================================================
   Etat
   ======================================================================= */
let categories = [
  { id:"discord", label:"Discord", type:"discord", statusClass:"", items:[
    { title:"Chargement…", subtitle:"", badge:"", url:"#", pfp:null },
    { title:CONFIG.discord.serverLabel, subtitle:CONFIG.discord.serverSubtitle, badge:"", url:CONFIG.discord.serverUrl, pfp:CONFIG.discord.serverPfp }
  ]},
  { id:"twitch", label:"Twitch", type:"twitch", statusClass:"", items:[
    { title:CONFIG.twitch.channel, subtitle:"Vérification du live…", badge:"", url:`https://twitch.tv/${CONFIG.twitch.channel}`, pfp:CONFIG.twitch.pfp },
    { type:"twitch-embed", channel:CONFIG.twitch.channel, live:false, url:`https://twitch.tv/${CONFIG.twitch.channel}` }
  ]},
  { id:"tiktok", label:"TikTok", type:"static", items:[
    { title:CONFIG.tiktok.label, subtitle:"Voir le profil", badge:"", url:CONFIG.tiktok.url, pfp:CONFIG.tiktok.pfp }
  ]},
  { id:"youtube", label:"YouTube", type:"static", items:[
    { title:CONFIG.youtube.label, subtitle:"Voir la chaîne", badge:"", url:CONFIG.youtube.url, pfp:CONFIG.youtube.pfp }
  ]}
];

let activeCatIndex = 0;
let activeItemIndex = 0;

const categoriesEl = document.getElementById("categories");
const submenuEl = document.getElementById("submenu");

/* =======================================================================
   Son de navigation (bip synthé, pas de fichier audio nécessaire)
   ======================================================================= */
let audioCtx;
function blip(freq){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = "sine";
    o.frequency.value = freq;
    g.gain.value = 0.05;
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + 0.18);
  }catch(e){ /* autoplay policy: ignore tant que l'utilisateur n'a pas interagi */ }
}

/* =======================================================================
   Rendu
   ======================================================================= */
function renderCategories(){
  categoriesEl.innerHTML = "";
  categories.forEach((cat, i) => {
    const el = document.createElement("div");
    el.className = "cat" + (i === activeCatIndex ? " active" : "");
    el.innerHTML = `
      <div class="icon-wrap">
        ${iconMarkup(cat)}
        ${cat.statusClass ? `<div class="status-dot ${cat.statusClass}"></div>` : ""}
      </div>
      <div class="label">${cat.label}</div>
    `;
    el.addEventListener("click", () => { selectCategory(i); });
    categoriesEl.appendChild(el);
  });
  centerActiveCategory();
}

function centerActiveCategory(){
  const catWidth = 74 + 56; // icône + gap approx
  const paddingLeft = window.innerWidth * 0.04;
  const offset = window.innerWidth / 2 - (activeCatIndex * catWidth) - 37 - paddingLeft;
  categoriesEl.style.transform = `translateX(${offset}px)`;
}

function renderSubmenu(){
  const cat = categories[activeCatIndex];
  const wrap = document.createElement("div");
  wrap.className = "submenu-inner";
  cat.items.forEach((item, i) => {
    if(item.type === "twitch-embed"){
      const div = document.createElement("div");
      div.className = "submenu-item embed-item" + (i === activeItemIndex ? " selected" : "");
      div.innerHTML = `
        <div class="embed-label">
          <span class="dot${item.live ? " live" : ""}"></span>
          ${item.live ? "Live en cours" : "Preview de la chaîne"}
        </div>
        <div class="twitch-embed-wrap" id="twitch-embed-wrap"></div>
      `;
      wrap.appendChild(div);
      mountTwitchEmbed(div.querySelector("#twitch-embed-wrap"), item.channel);
      return;
    }
    const a = document.createElement("a");
    a.href = item.url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.className = "submenu-item" + (i === activeItemIndex ? " selected" : "");
    a.innerHTML = `
      ${item.pfp ? `<img class="pfp" src="${item.pfp}" alt="">` : `<div class="pfp"></div>`}
      <div class="meta">
        <div class="title">${item.title}</div>
        ${item.subtitle ? `<div class="subtitle">${item.subtitle}</div>` : ""}
      </div>
      ${item.badge ? `<div class="badge ${item.badgeClass || ""}">${item.badge}</div>` : ""}
    `;
    wrap.appendChild(a);
  });
  submenuEl.innerHTML = "";
  submenuEl.appendChild(wrap);
}

// Embed responsive du player Twitch — technique décrite par Phil Nash
// (padding-top 56.25% pour garder un ratio 16:9 quelle que soit la largeur).
// Le paramètre "parent" est obligatoire et doit correspondre au(x) domaine(s)
// qui hébergent cette page, sinon Twitch refuse d'afficher le lecteur.
function mountTwitchEmbed(container, channel){
  if(!container) return;
  const hostname = window.location.hostname || "localhost";
  const src = `https://player.twitch.tv/?channel=${encodeURIComponent(channel)}&parent=${encodeURIComponent(hostname)}&muted=true`;
  const iframe = document.createElement("iframe");
  iframe.src = src;
  iframe.allowFullscreen = true;
  iframe.setAttribute("scrolling", "no");
  iframe.setAttribute("title", `Preview Twitch de ${channel}`);
  container.appendChild(iframe);
}

function selectCategory(i){
  if(i < 0 || i >= categories.length) return;
  activeCatIndex = i;
  activeItemIndex = 0;
  blip(520 + i * 40);
  renderCategories();
  renderSubmenu();
}

function selectItem(delta){
  const cat = categories[activeCatIndex];
  const next = activeItemIndex + delta;
  if(next < 0 || next >= cat.items.length) return;
  activeItemIndex = next;
  blip(440);
  renderSubmenu();
}

/* =======================================================================
   Navigation clavier
   ======================================================================= */
window.addEventListener("keydown", (e) => {
  switch(e.key){
    case "ArrowRight": selectCategory(activeCatIndex + 1); break;
    case "ArrowLeft": selectCategory(activeCatIndex - 1); break;
    case "ArrowDown": selectItem(1); break;
    case "ArrowUp": selectItem(-1); break;
    case "Enter": {
      const item = categories[activeCatIndex].items[activeItemIndex];
      if(item && item.url && item.url !== "#") window.open(item.url, "_blank");
      break;
    }
  }
});
window.addEventListener("resize", centerActiveCategory);

/* =======================================================================
   Discord — via Lanyard (api.lanyard.rest)
   NOTE : pour que ton statut soit suivi, tu dois avoir rejoint une fois
   le serveur Discord officiel de Lanyard : https://discord.gg/lanyard
   ======================================================================= */
async function fetchDiscord(){
  try{
    const res = await fetch(`https://api.lanyard.rest/v1/users/${CONFIG.discord.id}`);
    const json = await res.json();
    if(!json.success) throw new Error("Lanyard: profil non trouvé (as-tu rejoint le serveur Lanyard ?)");
    const d = json.data;
    const user = d.discord_user;
    const pfp = user.avatar
      ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`
      : null;
    const statusMap = { online:"En ligne", idle:"Absent", dnd:"Ne pas déranger", offline:"Hors ligne" };
    const statusClassMap = { online:"online", idle:"idle", dnd:"dnd", offline:"" };
    const badgeClassMap = { online:"online", idle:"idle", dnd:"dnd", offline:"offline" };
    categories[0].statusClass = statusClassMap[d.discord_status] || "";
    categories[0].items[0] = {
      title: `${user.username}`,
      subtitle: "",
      badge: statusMap[d.discord_status] || "Statut inconnu",
      badgeClass: badgeClassMap[d.discord_status] || "offline",
      url: `https://discord.com/users/${user.id}`,
      pfp
    };
  }catch(err){
    categories[0].items[0] = {
      title:"Discord indisponible",
      subtitle: err.message,
      badge:"", url:"#", pfp:null
    };
  }
  renderCategories();
  if(activeCatIndex === 0) renderSubmenu();
}

/* =======================================================================
   Twitch — via decapi.me (aucune clé API nécessaire)
   ======================================================================= */
async function fetchTwitch(){
  try{
    const uptimeRes = await fetch(`https://decapi.me/twitch/uptime/${CONFIG.twitch.channel}`);
    const uptime = (await uptimeRes.text()).trim();
    const isLive = !/offline/i.test(uptime);
    let subtitle = isLive ? `En live depuis ${uptime}` : "Hors ligne";
    let badge = isLive ? "LIVE" : "Hors ligne";

    if(isLive){
      try{
        const titleRes = await fetch(`https://decapi.me/twitch/title/${CONFIG.twitch.channel}`);
        const title = (await titleRes.text()).trim();
        if(title) subtitle = title;
      }catch(e){}
    }

    categories[1].statusClass = isLive ? "live" : "";
    categories[1].items[0] = {
      title: CONFIG.twitch.channel,
      subtitle,
      badge,
      badgeClass: isLive ? "live" : "",
      url: `https://twitch.tv/${CONFIG.twitch.channel}`,
      pfp: CONFIG.twitch.pfp
    };
    if(categories[1].items[1]) categories[1].items[1].live = isLive;
  }catch(err){
    categories[1].items[0] = {
      title: CONFIG.twitch.channel,
      subtitle:"Statut indisponible",
      badge:"", url:`https://twitch.tv/${CONFIG.twitch.channel}`, pfp:CONFIG.twitch.pfp
    };
  }
  renderCategories();
  if(activeCatIndex === 1) renderSubmenu();
}

/* =======================================================================
   LECTEUR DE MUSIQUE
   - Les pistes restent TOUJOURS dans l'ordre 1 → 10 (CONFIG.tracks).
   - A chaque arrivée sur le site, on démarre sur une piste de départ
     tirée au hasard (ex: la 3 ou la 9), jamais toujours la même.
   - Ensuite "suivant"/"précédent" avancent/reculent simplement d'un cran
     dans cet ordre fixe, en bouclant (après la 10 on revient à la 1,
     avant la 1 on revient à la 10).
   - Pochette + titre + artiste, play/pause, skip, volume, minimisation.
   ======================================================================= */
const musicAudio = new Audio();
musicAudio.volume = 0.6;

const mp = {
  cover:  document.getElementById("mp-cover"),
  title:  document.getElementById("mp-title"),
  artist: document.getElementById("mp-artist"),
  playBtn: document.getElementById("mp-play"),
  playIcon: document.getElementById("mp-play-icon"),
  prevBtn: document.getElementById("mp-prev"),
  nextBtn: document.getElementById("mp-next"),
  volume: document.getElementById("mp-volume"),
  minimizeBtn: document.getElementById("mp-minimize"),
  panel: document.getElementById("music-player")
};

const ICON_PLAY  = '<path d="M8 5v14l11-7z"/>';
const ICON_PAUSE = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';

let currentTrackIndex = null;
let isPlaying = false;

function loadTrack(idx){
  const t = CONFIG.tracks[idx];
  if(!t) return;
  currentTrackIndex = idx;
  musicAudio.src = t.src;
  mp.cover.src = t.cover || "";
  mp.title.textContent = t.title;
  mp.artist.textContent = t.artist;
}

function playTrackAt(idx){
  loadTrack(idx);
  musicAudio.play().then(() => {
    isPlaying = true;
    updatePlayIcon();
  }).catch(() => {
    // lecture bloquée tant qu'il n'y a pas eu d'interaction utilisateur
    isPlaying = false;
    updatePlayIcon();
  });
}

function updatePlayIcon(){
  mp.playIcon.innerHTML = isPlaying ? ICON_PAUSE : ICON_PLAY;
}

function togglePlay(){
  if(currentTrackIndex === null){
    startPlaylist();
    return;
  }
  if(isPlaying){
    musicAudio.pause();
    isPlaying = false;
  }else{
    musicAudio.play().catch(()=>{});
    isPlaying = true;
  }
  updatePlayIcon();
}

// Piste suivante dans l'ordre fixe, en bouclant après la dernière
function goNext(){
  const n = CONFIG.tracks.length;
  if(n === 0) return;
  const idx = currentTrackIndex === null ? 0 : (currentTrackIndex + 1) % n;
  playTrackAt(idx);
}

// Piste précédente dans l'ordre fixe, en bouclant avant la première
function goPrev(){
  const n = CONFIG.tracks.length;
  if(n === 0) return;
  const idx = currentTrackIndex === null ? 0 : (currentTrackIndex - 1 + n) % n;
  playTrackAt(idx);
}

// Point de départ : tiré au hasard une fois par arrivée sur le site,
// puis on suit l'ordre fixe 1→10 (en boucle) à partir de là.
function startPlaylist(){
  const n = CONFIG.tracks.length;
  if(n === 0) return;
  const startIdx = Math.floor(Math.random() * n);
  playTrackAt(startIdx);
}

musicAudio.addEventListener("ended", () => {
  goNext();
});

mp.playBtn.addEventListener("click", togglePlay);
mp.nextBtn.addEventListener("click", goNext);
mp.prevBtn.addEventListener("click", goPrev);
mp.volume.addEventListener("input", (e) => {
  musicAudio.volume = parseFloat(e.target.value);
});
mp.minimizeBtn.addEventListener("click", () => {
  mp.panel.classList.toggle("minimized");
});

updatePlayIcon();

/* =======================================================================
   Init
   ======================================================================= */
renderCategories();
renderSubmenu();
fetchDiscord();
fetchTwitch();
setInterval(fetchDiscord, 30000);
setInterval(fetchTwitch, 60000);

/* Animation de boot façon PS3 : on masque l'écran après un court instant,
   puis on lance directement une musique */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("boot-screen").classList.add("hidden");
    startPlaylist();
  }, 2300);
});
</script>
